name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build the libraries first: pixi + demo typecheck resolve @open-slot-ui/core via
      # its built dist (the package `exports`), so dist must exist before tsc runs.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build:demo
      - run: pnpm --filter @open-slot-ui/site build
